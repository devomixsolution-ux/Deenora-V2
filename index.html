
<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Madrasah Contact App</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#9D50FF">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                blue: '#4844F8',
                purple: '#8D30F4',
                soft: '#F2EBFF',
                lavender: '#A179FF',
                deep: '#2E0B5E',
                dark: '#1A0B2E',
              }
            },
            animation: {
              'float': 'float 3s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
      }
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; 
        background-color: #9D50FF;
        position: fixed; 
        left: 0;
        top: 0;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
      }
      body {
        font-family: 'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
        -webkit-tap-highlight-color: transparent;
        color: #2D3142;
      }
      #root {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      .font-noto { font-family: 'Noto Sans Bengali', sans-serif; }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-radius: 2.5rem;
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      }

      .premium-btn {
        background: linear-gradient(135deg, #8D30F4 0%, #A179FF 100%);
        box-shadow: 0 12px 28px -5px rgba(141, 48, 244, 0.4);
        color: white;
      }

      .mesh-bg-vibrant {
        background: linear-gradient(135deg, #9D50FF, #8D30F4, #6C38FF);
      }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }
      
      input::placeholder, textarea::placeholder {
        color: #94A3B8;
        font-weight: 500;
      }

      .scroll-container {
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        height: 100%;
      }

      /* Portaled Fix */
      .modal-overlay {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        z-index: 99999 !important;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 !important;
        padding: 20px;
        backdrop-filter: blur(30px) !important;
        -webkit-backdrop-filter: blur(30px) !important;
        background-color: rgba(8, 10, 18, 0.5) !important;
      }

      @keyframes shimmer-fast {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="mesh-bg-vibrant">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
